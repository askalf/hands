# Dependabot version-update config.
#
# Security-advisory updates are separate (repo-level setting). This
# file covers *version* updates. Non-major updates grouped into a
# single weekly PR per ecosystem; majors open individually.

version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    groups:
      non-major:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      non-major:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: ci
      include: scope
