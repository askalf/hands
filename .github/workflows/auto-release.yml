name: Auto release on version bump

# Fires on merge of ANY PR to main. Exits early unless package.json's
# `version` field differs from the parent commit's. When the version
# did change, this workflow builds + smoke-tests, creates the matching
# `vX.Y.Z` tag + GitHub release (CHANGELOG section extracted as notes),
# and then DISPATCHES `publish.yml`, which does the tokenless npm
# publish via OIDC trusted publishing.
#
# Why an explicit dispatch rather than relying on `publish.yml`'s
# `release: published` trigger: GitHub doesn't fire downstream
# workflows for events created by GITHUB_TOKEN (loop protection). Hit
# on deepdive v0.3.0 — the auto-created release didn't kick
# publish.yml, required a manual delete+recreate from a human token.
# `gh workflow run` from GITHUB_TOKEN works fine (needs
# `actions: write`), so the release-create → dispatch chain closes
# that gap without any inline publish or NPM_TOKEN here. If the
# dispatched publish run fails, the retry is simply re-dispatching
# publish.yml with the same tag (see npm-drift-watch.yml's runbook).

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  # actions: write lets this workflow `gh workflow run publish.yml` —
  # the npm publish (and its id-token: write OIDC needs) live entirely
  # in publish.yml now.
  actions: write
  id-token: write # keyless Sigstore signing (attest-build-provenance)
  attestations: write # persist the attestation in GitHub's store

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (post-merge state)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 2  # need HEAD^1 for the version-diff check
          persist-credentials: false

      - name: Check if version actually changed
        id: ver
        run: |
          set -eo pipefail
          CURRENT=$(node -pe "require('./package.json').version")
          PARENT=$(git show HEAD^1:package.json 2>/dev/null \
            | node -pe "JSON.parse(require('fs').readFileSync(0,'utf-8')).version" \
            || echo "")
          if [ "$CURRENT" = "$PARENT" ]; then
            echo "Version unchanged at $CURRENT — not releasing."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! [[ "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Refusing to release — package.json version '$CURRENT' doesn't match X.Y.Z" >&2
            exit 1
          fi
          echo "Version bumped: $PARENT → $CURRENT"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Ensure tag doesn't already exist
        if: steps.ver.outputs.changed == 'true'
        run: |
          # Ask the REMOTE, not the local checkout: actions/checkout with
          # fetch-depth: 2 doesn't fetch tags, so the previous
          # `git rev-parse "$TAG"` guard could never see an existing tag —
          # it was a latent no-op (same bug found on deepdive).
          TAG="v${{ steps.ver.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin — aborting to avoid tag-overwrite."
            exit 1
          fi

      - name: Set up Node
        if: steps.ver.outputs.changed == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: npm ci
        if: steps.ver.outputs.changed == 'true'
        run: npm ci

      - name: typecheck
        if: steps.ver.outputs.changed == 'true'
        run: npm run typecheck

      - name: build
        if: steps.ver.outputs.changed == 'true'
        run: npm run build

      - name: --help smoke
        if: steps.ver.outputs.changed == 'true'
        run: node dist/cli.js --help

      - name: Extract release notes from CHANGELOG
        if: steps.ver.outputs.changed == 'true'
        run: |
          set -eo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          # Regex anchors the heading with (?:^|\n) and has NO /m flag, so the
          # `$` terminator means end-of-string. The old /m version let `$` match
          # the blank line right after the heading, so the lazy capture returned
          # empty — every release through v0.21.0 shipped with an empty GitHub
          # release body (notes still live in CHANGELOG.md). Verified offline.
          node -e "
            const fs = require('fs');
            const md = fs.existsSync('CHANGELOG.md') ? fs.readFileSync('CHANGELOG.md', 'utf-8') : '';
            const re = new RegExp('(?:^|\\\\n)## \\\\[' + '${VERSION}' + '\\\\][^\\\\n]*\\\\n([\\\\s\\\\S]*?)(?=\\\\n## \\\\[|$)');
            const m = re.exec(md);
            process.stdout.write(m ? m[1].trim() : '(no changelog section found for this version)');
          " > release-notes.md
          echo "--- release-notes.md ---"
          cat release-notes.md

      - name: Create GitHub release
        if: steps.ver.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          {
            echo "Auto-released from merge of [PR #${{ github.event.pull_request.number }}](${{ github.event.pull_request.html_url }})."
            echo ""
            cat release-notes.md
            echo ""
            echo "---"
            echo ""
            echo "Built + tested by \`auto-release.yml\` on this run; npm publish is tokenless via \`publish.yml\` (OIDC trusted publishing), dispatched by this run."
          } > body.md

          gh release create "$TAG" --title "$TAG" --notes-file body.md

      - name: Build npm tarball (release artifact)
        if: steps.ver.outputs.changed == 'true'
        id: pack
        run: |
          set -euo pipefail
          tarball=$(npm pack --silent)
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"
          sha256sum "$tarball"

      - name: Attest build provenance (keyless Sigstore)
        if: steps.ver.outputs.changed == 'true'
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      - name: Upload tarball + provenance bundle to the release
        if: steps.ver.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.ver.outputs.version }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
          BUNDLE: ${{ steps.attest.outputs.bundle-path }}
        run: |
          set -euo pipefail
          cp "$BUNDLE" "${TARBALL}.sigstore.json"
          gh release upload "$TAG" --clobber "$TARBALL" "${TARBALL}.sigstore.json"

      # The npm publish itself happens in publish.yml (the workflow the
      # npmjs trusted publisher is bound to) — dispatched explicitly
      # because the GITHUB_TOKEN-created release above won't fire
      # publish.yml's `release: published` trigger on its own.
      - name: Dispatch tokenless npm publish (publish.yml)
        if: steps.ver.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          gh workflow run publish.yml --ref main -f tag="$TAG"
          echo "Dispatched publish.yml for $TAG."

      - name: Post-release summary
        if: steps.ver.outputs.changed == 'true'
        run: |
          echo "✓ Released v${{ steps.ver.outputs.version }}"
          echo "✓ Triggered by PR #${{ github.event.pull_request.number }}"
          echo "✓ Dispatched publish.yml — tokenless npm publish via OIDC trusted publishing (with SLSA provenance)"
