name: Publish to npm

# Fires when a GitHub Release is published — the manual-release path for
# cases where `auto-release.yml`'s PR-merge trigger isn't the right
# shape (e.g. first release of a repo where `package.json` started at
# the target version, or bumping an off-master branch). A release
# created by the maintainer's own `gh release create` DOES fire this
# (human-token release events fire downstream workflows; GITHUB_TOKEN-
# created releases don't — that's why auto-release.yml publishes inline).
#
# The release tag should match `package.json` version — the workflow
# doesn't enforce that, but a mismatched tag/version will either
# succeed confusingly (if the package.json number isn't on npm) or
# fail (if it is). Keep them aligned at release-prep time.

on:
  release:
    types: [published]
  # workflow_dispatch is the rescue path for a stranded release —
  # publishes whatever's in package.json on the dispatched ref to npm.
  # Needed because auto-release.yml's one-axis version-diff gate cannot
  # retry a failed publish (it short-circuits when HEAD vs HEAD^1 shows
  # no version bump, regardless of whether npm has the version). Used
  # 2026-05-22 to backfill v0.4.1 after the 2026-05-07 auto-release run
  # failed at `npm publish` with E404 (stale NPM_TOKEN); the GitHub
  # release exists, npm just never got the artifact.
  workflow_dispatch:

permissions:
  contents: read
  # id-token: write required for `npm publish --provenance` SLSA
  # attestation. Without this, publish either fails or skips provenance.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: node dist/cli.js --help
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
