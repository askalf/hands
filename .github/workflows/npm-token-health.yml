name: NPM_TOKEN health

# Daily check that the NPM_TOKEN secret still authenticates against the
# npm registry. Opens a GitHub issue if `npm whoami` fails — catches
# token rot, revocation, or scope changes BEFORE the next release fires
# and silently leaves npm behind.
#
# Why this matters for @askalf/hands specifically: on 2026-05-07 the
# v0.4.1 auto-release run failed at `npm publish` with HTTP 404 because
# the NPM_TOKEN had been rotated and the secret hadn't been updated. The
# GitHub release was created, but npm never got the artifact. The
# stranding wasn't noticed for 15 days because auto-release.yml's one-
# axis "did this PR bump the version?" gate continued reporting
# "success" on every subsequent dependabot/docs merge (no version diff
# → no publish attempted → no failure to surface). This monitor turns
# token rot into a GH issue within 24h instead of into a stranded
# release that nobody notices until a user reports the missing version.
#
# Same pattern shipped today on @askalf/agent and @askalf/deepdive after
# the parallel incident audits.
#
# Triggers:
#  - daily at 04:17 UTC (off-peak, offset minute to avoid stacking)
#  - workflow_dispatch for manual verification right after rotating

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  whoami:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Check NPM_TOKEN
        id: check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set +e
          whoami_out=$(npm whoami --registry=https://registry.npmjs.org 2>&1)
          whoami_exit=$?
          set -e
          echo "exit=$whoami_exit" >> "$GITHUB_OUTPUT"
          echo "$whoami_out" > whoami.txt
          if [ "$whoami_exit" = "0" ]; then
            echo "NPM_TOKEN healthy. whoami: $whoami_out"
          else
            echo "::error::NPM_TOKEN authentication failed (exit $whoami_exit)"
            echo "--- whoami output ---"
            cat whoami.txt
          fi

      - name: Open issue on token failure
        if: steps.check.outputs.exit != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          marker='<!-- hands-npm-token-rot -->'
          existing=$(gh issue list -R "${{ github.repository }}" --state open --search "in:body $marker" --json number --jq '.[0].number // ""')
          if [ -n "$existing" ]; then
            echo "Existing open token-rot issue #$existing — leaving alone."
            exit 0
          fi

          body_file=$(mktemp)
          {
            echo "$marker"
            echo ""
            echo "### NPM_TOKEN authentication failed"
            echo ""
            echo "Daily \`npm whoami\` check could not authenticate to the npm registry. The token is likely expired, revoked, or has had its scopes changed."
            echo ""
            echo "**Impact:** the next \`@askalf/hands\` release will fail at npm publish. The repo's \`auto-release.yml\` only checks 'did this PR bump the version?' as its gate — it cannot detect 'npm is behind the latest release' — so a stranded release will NOT auto-recover on later merges. Manual dispatch of \`publish.yml\` is required after the secret is fixed."
            echo ""
            echo "### To fix"
            echo ""
            echo "1. npmjs.com → Access Tokens → **Generate New Token** → **Granular Access Token**"
            echo "2. Scope: \`@askalf/*\` (or just \`@askalf/hands\`) with **Read and write** permission"
            echo "3. Copy the token (\`npm_xxxxx...\`)"
            echo "4. \`gh secret set NPM_TOKEN -R askalf/hands\` (paste when prompted)"
            echo "5. Verify token: \`gh workflow run npm-token-health.yml -R askalf/hands\` — this issue auto-closes when the next health check passes"
            echo "6. Backfill any stranded release: \`gh workflow run publish.yml -R askalf/hands --ref main\` — publishes whatever's in package.json on main"
            echo ""
            echo "### whoami output"
            echo ""
            echo "\`\`\`"
            cat whoami.txt
            echo "\`\`\`"
            echo ""
            echo "### Workflow run"
            echo ""
            echo "[Run #${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } > "$body_file"

          gh issue create \
            -R "${{ github.repository }}" \
            --title "NPM_TOKEN auth failed — token rot detected" \
            --body-file "$body_file" \
            --label "npm-token-rot"

      - name: Auto-close any open token-rot issue on success
        if: steps.check.outputs.exit == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          marker='<!-- hands-npm-token-rot -->'
          open_issues=$(gh issue list -R "${{ github.repository }}" --state open --search "in:body $marker" --json number --jq '.[].number')
          for n in $open_issues; do
            gh issue close "$n" -R "${{ github.repository }}" --comment "Auto-closed: \`npm whoami\` succeeded on [run #${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}). Token healthy again."
          done
